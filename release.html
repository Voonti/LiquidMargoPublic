<div id="client-dashboard" class="client-dashboard" style="display: none;">
    <img src="https://static.thenounproject.com/png/3584118-200.png" alt="Exit" class="client-exit-button">
    <div class="client-dashboard-buttons">
        <button class="client-dashboard-button">Bot</button>
        <button class="client-dashboard-button">Addons</button>
        <button class="client-dashboard-button">Profile</button>
        <button class="client-dashboard-button">Develop</button>
    </div>
    <div class="client-dashboard-content" style="display: none;">
        <div class="client-addons-sidebar">
            <client-toggle-button addon-title="Anonymizer" tip="Streamuj main konto :)"></client-toggle-button>
            <client-toggle-button addon-title="ColossusSlayer" tip="Zbije ci kolosa (wszystko zrobi samemu)"></client-toggle-button>
            <client-toggle-button addon-title="HeroesSlayer" hasDropDown="true" tip="Znajdzie herosa (chyba)"></client-toggle-button>
        </div>
    </div>
    <div class="client-dashboard-content">
        <div class="client-addons-sidebar">
            <client-toggle-button addon-title="AutoTP" tip="wytepuje po walce"></client-toggle-button>
            <client-toggle-button addon-title="AntyEscape" tip="Gdy ktoś rzuci ucieczke, to dobijasz odrazu"></client-toggle-button>
            <client-toggle-button addon-title="GrpSender" tip="Wysyła zaproszenie do grupy, gdy sojusznik wejdzie na mape"></client-toggle-button>
            <client-toggle-button addon-title="GrpDisband" tip="Gdy masz D w grupie, rozwalasz grupe. Gdy nie masz, wychodzisz."></client-toggle-button>
            <client-toggle-button addon-title="AutoHeal" tip="Autoleczenie po walce"></client-toggle-button>
            <client-toggle-button addon-title="TitanSlayer" tip="Losuje tytana ~1.5s po zrespieniu"></client-toggle-button>
            <client-toggle-button addon-title="SuperSaiyan" tip="Szybkie przechodzenie"></client-toggle-button>
        </div>
    </div>
    <div class="client-dashboard-content" style="display: none;">
        <div class="client-addons-sidebar" style="height: 100%;">
            <client-profile-page></client-profile-page>
        </div>
    </div>
    <div class="client-dashboard-content" style="display: none;">
        <div class="client-addons-sidebar" style="height: 100%;">
            <client-toggle-button addon-title="LogTrace" tip="console log all trace logs"></client-toggle-button>
            <client-toggle-button addon-title="LogDebug" tip="console log all debug logs"></client-toggle-button>
            <client-toggle-button addon-title="LogError" tip="console log all error logs"></client-toggle-button>
            <client-toggle-button addon-title="CaptchaSaver" tip="It download automatically captcha, when it appear"></client-toggle-button>
        </div>
    </div>
</div>
